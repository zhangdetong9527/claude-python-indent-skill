# Ruff配置文件模板
# 将此文件复制到项目根目录并重命名为 ruff.toml
# 或者将内容添加到 pyproject.toml 的 [tool.ruff] 部分

# 基础配置
line-length = 88  # 每行最大字符数（Black默认值）
indent-width = 4  # 缩进宽度

# 目标Python版本
target-version = "py38"

# 排除的文件和目录
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

# 格式化配置
[format]
quote-style = "double"           # 使用双引号
indent-style = "space"           # 使用空格缩进
skip-magic-trailing-comma = false
line-ending = "auto"         # 自动检测行尾符

# 代码检查配置
[lint]
# 启用的规则集
select = [
    "E",   # pycodestyle错误
    "W",   # pycodestyle警告
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]

# 忽略的规则
ignore = [
    "E501",  # 行太长（由formatter处理）
    "B008",  # 函数调用中的默认参数
]

# 每个文件允许的未使用导入数量
unfixable = []

# 允许自动修复的规则
fixable = ["ALL"]

# isort配置
[lint.isort]
known-first-party = []
force-single-line = false
force-sort-within-sections = false

# pep8-naming配置
[lint.pep8-naming]
classmethod-decorators = ["classmethod"]

# 示例：项目特定配置
# [lint.per-file-ignores]
# "tests/**/*.py" = ["S101"]  # 测试文件允许使用assert
# "__init__.py" = ["F401"]    # __init__.py允许未使用的导入
